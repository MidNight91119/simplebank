apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-bank-api-deployment
  labels:
    app: simple-bank-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-bank-api
  template:
    metadata:
      labels:
        app: simple-bank-api
    spec:
      containers:
        - name: simple-bank-api
          image: 398895653488.dkr.ecr.ap-south-1.amazonaws.com/simplebank:739a6e7b87f88b07831119658ed6f45beaa1049f
          ports:
            - containerPort: 8080
          resources:
            requests: # what the pod is guaranteed
              cpu: "100m"
              memory: "128Mi"
            limits: # the hard ceiling
              cpu: "250m"
              memory: "256Mi"
